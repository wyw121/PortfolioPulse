name: 🚀 构建和发布

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: 构建项目
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: portfolio_pulse
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: 📦 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: 🗃️ 设置数据库
        env:
          DATABASE_URL: mysql://root:password@127.0.0.1:3306/portfolio_pulse
        run: |
          echo "安装 SQLx CLI..."
          cargo install sqlx-cli --no-default-features --features native-tls,mysql

          echo "运行数据库迁移..."
          cd backend
          sqlx migrate run

      - name: 🏗️ 构建后端
        env:
          DATABASE_URL: mysql://root:password@127.0.0.1:3306/portfolio_pulse
        run: |
          cd backend
          cargo build --release

      - name: 🏗️ 构建前端
        run: |
          cd frontend
          npm ci
          npm run build

      - name: 📦 打包构建产物
        run: |
          mkdir -p dist
          cp backend/target/release/portfolio-pulse-backend dist/
          cp -r frontend/.next/standalone dist/frontend
          cp -r frontend/.next/static dist/frontend/.next/
          cp -r frontend/public dist/frontend/

      - name: 🚀 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: portfolio-pulse-build
          path: dist/

  release:
    name: 创建发布
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: 📥 下载构建产物
        uses: actions/download-artifact@v4
        with:
          name: portfolio-pulse-build
          path: dist/

      - name: 📦 创建发布包
        run: |
          cd dist
          tar -czf ../portfolio-pulse-${{ github.ref_name }}.tar.gz .

      - name: 🚀 创建GitHub发布
        uses: softprops/action-gh-release@v2
        with:
          files: portfolio-pulse-${{ github.ref_name }}.tar.gz
          generate_release_notes: true
